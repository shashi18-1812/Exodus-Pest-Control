<section class="quote-section">

    <h2>Get a Free Quote</h2>

    <form class="quote-form">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="fullname" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="tel" name="phone" required>
        </div>

        <div class="form-group">
            <label>Premise Type</label>

            <select id="premiseType" onchange="toggleFields()" required>
                <option value="">Select Premise Type</option>
                <option value="Residential">Residential</option>
                <option value="Commercial">Commercial</option>
            </select>
        </div>

        <!-- Residential Fields -->
        <div id="residentialFields" style="display:none;">

            <div class="form-group">
                <label>House Type</label>

                <select>
                    <option>Select House Type</option>
                    <option>1 BHK</option>
                    <option>2 BHK</option>
                    <option>3 BHK</option>
                    <option>4 BHK</option>
                </select>
            </div>

            <div class="form-group">
                <label>Select Pest</label>

                <select>
                    <option>Select Pest</option>
                    <option>Cockroach</option>
                    <option>Termite</option>
                    <option>Bed Bugs</option>
                    <option>Rodents</option>
                </select>
            </div>

            <div class="form-group">
                <label>Describe More</label>
                <textarea rows="5"></textarea>
            </div>

        </div>

        <!-- Commercial Fields -->
        <div id="commercialFields" style="display:none;">

            <div class="form-group">
                <label>Describe Your Requirement</label>

                <textarea rows="6"></textarea>
            </div>

        </div>

        <button type="submit" class="submit-btn">
            Submit
        </button>

    </form>

</section>


<script src="quote.js"></script>

</html>
